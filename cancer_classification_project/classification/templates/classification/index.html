<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cancer Prediction</title>
</head>
<body>
    <h2>Cancer Prediction</h2>
    <form action="/predict" method="post">
        <!-- Adjust the number of inputs based on your model's expected input size -->
        <label>Feature 1: <input type="text" name="feature1" required></label><br>
        <label>Feature 2: <input type="text" name="feature2" required></label><br>
        <label>Feature 3: <input type="text" name="feature3" required></label><br>
        <!-- Add more input fields as needed -->
        <button type="submit">Predict</button>
    </form>
    
    {% if prediction_text %}
    <h3>{{ prediction_text }}</h3>
    {% endif %}
</body>
</html>
